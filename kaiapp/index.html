<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ระบบตรวจสอบการชำระเงินค่าเทอม | KaiApp</title>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Prompt', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      max-width: 1400px;
      margin: 0 auto;
    }
    
    .header {
      text-align: center;
      padding: 30px;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      margin-bottom: 30px;
    }
    
    .header h1 {
      font-size: 2.5rem;
      font-weight: 700;
      color: #2d3748;
      margin-bottom: 10px;
    }
    
    .header p {
      font-size: 1.2rem;
      color: #4a5568;
      margin-bottom: 20px;
    }
    
    .stats-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    
    .stat-card {
      background: rgba(255, 255, 255, 0.95);
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
      text-align: center;
      transition: transform 0.3s ease;
    }
    
    .stat-card:hover {
      transform: translateY(-5px);
    }
    
    .stat-number {
      font-size: 2.5rem;
      font-weight: 700;
      color: #4299e1;
      margin-bottom: 10px;
    }
    
    .stat-label {
      font-size: 1rem;
      color: #4a5568;
      font-weight: 600;
    }
    
    .table-container {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      overflow: hidden;
      margin-bottom: 30px;
    }
    
    .table-header {
      background: linear-gradient(135deg, #4299e1, #3182ce);
      color: white;
      padding: 20px;
      text-align: center;
    }
    
    .table-header h2 {
      font-size: 1.5rem;
      font-weight: 600;
    }
    
    .table-controls {
      padding: 20px;
      background: #f7fafc;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
    }
    
    .search-box {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      min-width: 300px;
    }
    
    .search-box input {
      flex: 1;
      padding: 10px 15px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-family: 'Prompt', sans-serif;
      font-size: 1rem;
    }
    
    .search-box input:focus {
      outline: none;
      border-color: #4299e1;
    }
    
    .filter-buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-family: 'Prompt', sans-serif;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .btn-primary {
      background: #4299e1;
      color: white;
    }
    
    .btn-primary:hover {
      background: #3182ce;
      transform: translateY(-2px);
    }
    
    .btn-success {
      background: #48bb78;
      color: white;
    }
    
    .btn-success:hover {
      background: #38a169;
      transform: translateY(-2px);
    }
    
    .btn-warning {
      background: #ed8936;
      color: white;
    }
    
    .btn-warning:hover {
      background: #dd6b20;
      transform: translateY(-2px);
    }
    
    .btn-danger {
      background: #f56565;
      color: white;
    }
    
    .btn-danger:hover {
      background: #e53e3e;
      transform: translateY(-2px);
    }
    
    .data-table {
      width: 100%;
      border-collapse: collapse;
    }
    
    .data-table thead {
      background: #edf2f7;
    }
    
    .data-table th {
      padding: 15px;
      text-align: left;
      font-weight: 600;
      color: #2d3748;
      border-bottom: 2px solid #e2e8f0;
      position: sticky;
      top: 0;
      background: #edf2f7;
      z-index: 10;
    }
    
    .data-table td {
      padding: 15px;
      border-bottom: 1px solid #e2e8f0;
      color: #4a5568;
    }
    
    .data-table tbody tr {
      transition: background-color 0.3s ease;
    }
    
    .data-table tbody tr:hover {
      background: #f7fafc;
    }
    
    .status-paid {
      background: #c6f6d5;
      color: #22543d;
      padding: 5px 12px;
      border-radius: 20px;
      font-weight: 600;
      font-size: 0.85rem;
    }
    
    .status-unpaid {
      background: #fed7d7;
      color: #742a2a;
      padding: 5px 12px;
      border-radius: 20px;
      font-weight: 600;
      font-size: 0.85rem;
    }
    
    .status-partial {
      background: #feebc8;
      color: #744210;
      padding: 5px 12px;
      border-radius: 20px;
      font-weight: 600;
      font-size: 0.85rem;
    }
    
    .loading {
      text-align: center;
      padding: 50px;
      font-size: 1.2rem;
      color: #4a5568;
    }
    
    .error {
      text-align: center;
      padding: 50px;
      font-size: 1.2rem;
      color: #e53e3e;
    }
    
    .refresh-btn {
      position: fixed;
      bottom: 30px;
      right: 30px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: #4299e1;
      color: white;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      box-shadow: 0 5px 20px rgba(66, 153, 225, 0.4);
      transition: all 0.3s ease;
      z-index: 1000;
    }
    
    .refresh-btn:hover {
      background: #3182ce;
      transform: scale(1.1);
    }
    
    @media (max-width: 768px) {
      .header h1 {
        font-size: 2rem;
      }
      
      .table-controls {
        flex-direction: column;
        align-items: stretch;
      }
      
      .search-box {
        min-width: auto;
      }
      
      .data-table {
        font-size: 0.9rem;
      }
      
      .data-table th,
      .data-table td {
        padding: 10px;
      }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>📊 ระบบตรวจสอบการชำระเงินค่าเทอม</h1>
    <p>วิทยาลัยราชภัฏเชียงใหม่ - คณะวิทยาศาสตร์และเทคโนโลยี</p>
  </div>

  <div class="stats-container" id="statsContainer">
    <div class="stat-card">
      <div class="stat-number" id="totalStudents">-</div>
      <div class="stat-label">จำนวนนักเรียนทั้งหมด</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="paidStudents">-</div>
      <div class="stat-label">ชำระเงินแล้ว</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="unpaidStudents">-</div>
      <div class="stat-label">ยังไม่ได้ชำระ</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="totalAmount">-</div>
      <div class="stat-label">ยอดเงินรวม (บาท)</div>
    </div>
  </div>

  <div class="table-container">
    <div class="table-header">
      <h2>📋 รายชื่อนักเรียนและสถานะการชำระเงิน</h2>
    </div>
    
    <div class="table-controls">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="ค้นหาชื่อ รหัสนักศึกษา หรือชั้นเรียน...">
      </div>
      <div class="filter-buttons">
        <button class="btn btn-primary" onclick="filterData('all')">ทั้งหมด</button>
        <button class="btn btn-success" onclick="filterData('paid')">ชำระแล้ว</button>
        <button class="btn btn-danger" onclick="filterData('unpaid')">ยังไม่ได้ชำระ</button>
        <button class="btn btn-warning" onclick="filterData('partial')">ชำระบางส่วน</button>
      </div>
    </div>
    
    <div id="tableContent">
      <div class="loading">กำลังโหลดข้อมูล...</div>
    </div>
  </div>
</div>

<button class="refresh-btn" onclick="loadData()" title="รีเฟรชข้อมูล">
  🔄
</button>

<script>
let allData = [];
let filteredData = [];

// Google Sheets API configuration
const SPREADSHEET_ID = '1xh2DVr7YwvN-2tGrZixf1b_oYPa5FvlAHNSaLXFNZJw';
const API_KEY = 'AIzaSyBp9nD7hHkPqL8cXQ8z8Q3qY3qJ3rJ8qW';
const RANGE = 'Sheet1!A:G';

// Load data from Google Sheets API
async function loadData() {
  try {
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${RANGE}?key=${API_KEY}`;
    const response = await fetch(url);
    const data = await response.json();
    
    if (data.values && data.values.length > 0) {
      // Convert to array of objects
      const headers = data.values[0];
      allData = data.values.slice(1).map(row => {
        const obj = {};
        headers.forEach((header, index) => {
          obj[header] = row[index] || '';
        });
        return obj;
      });
      
      filteredData = [...allData];
      updateStats();
      renderTable();
    } else {
      document.getElementById('tableContent').innerHTML = '<div class="error">ไม่พบข้อมูลใน Google Sheets</div>';
    }
  } catch (error) {
    console.error('Error loading data:', error);
    document.getElementById('tableContent').innerHTML = '<div class="error">เกิดข้อผิดพลาดในการโหลดข้อมูล กรุณาลองใหม่</div>';
  }
}

// Update statistics
function updateStats() {
  const totalStudents = filteredData.length;
  const paidStudents = filteredData.filter(student => 
    student['สถานะการชำระเงิน'] && 
    student['สถานะการชำระเงิน'].toLowerCase().includes('ชำระ')
  ).length;
  const unpaidStudents = filteredData.filter(student => 
    !student['สถานะการชำระเงิน'] || 
    student['สถานะการชำระเงิน'].toLowerCase().includes('ไม่ได้')
  ).length;
  
  // Calculate total amount (assuming there's an amount column)
  const totalAmount = filteredData.reduce((sum, student) => {
    const amount = parseFloat(student['จำนวนเงิน']) || 0;
    return sum + amount;
  }, 0);
  
  document.getElementById('totalStudents').textContent = totalStudents;
  document.getElementById('paidStudents').textContent = paidStudents;
  document.getElementById('unpaidStudents').textContent = unpaidStudents;
  document.getElementById('totalAmount').textContent = totalAmount.toLocaleString('th-TH');
}

// Render table
function renderTable() {
  const tableContent = document.getElementById('tableContent');
  
  if (filteredData.length === 0) {
    tableContent.innerHTML = '<div class="error">ไม่พบข้อมูลที่ตรงกับเงื่อนไข</div>';
    return;
  }
  
  let tableHTML = `
    <table class="data-table">
      <thead>
        <tr>
          <th>ลำดับ</th>
          <th>รหัสนักศึกษา</th>
          <th>ชื่อ-นามสกุล</th>
          <th>ชั้นเรียน</th>
          <th>จำนวนเงิน (บาท)</th>
          <th>วันที่ชำระ</th>
          <th>สถานะการชำระเงิน</th>
        </tr>
      </thead>
      <tbody>
  `;
  
  filteredData.forEach((student, index) => {
    const status = student['สถานะการชำระเงิน'] || 'ยังไม่ได้ชำระ';
    let statusClass = 'status-unpaid';
    
    if (status.toLowerCase().includes('ชำระ')) {
      statusClass = 'status-paid';
    } else if (status.toLowerCase().includes('บางส่วน')) {
      statusClass = 'status-partial';
    }
    
    tableHTML += `
      <tr>
        <td>${index + 1}</td>
        <td>${student['รหัสนักศึกษา'] || '-'}</td>
        <td>${student['ชื่อ-นามสกุล'] || '-'}</td>
        <td>${student['ชั้นเรียน'] || '-'}</td>
        <td>${student['จำนวนเงิน'] ? parseFloat(student['จำนวนเงิน']).toLocaleString('th-TH') : '-'}</td>
        <td>${student['วันที่ชำระ'] || '-'}</td>
        <td><span class="${statusClass}">${status}</span></td>
      </tr>
    `;
  });
  
  tableHTML += '</tbody></table>';
  tableContent.innerHTML = tableHTML;
}

// Filter data
function filterData(status) {
  const searchTerm = document.getElementById('searchInput').value.toLowerCase();
  
  filteredData = allData.filter(student => {
    const matchesSearch = 
      (student['รหัสนักศึกษา'] && student['รหัสนักศึกษา'].toLowerCase().includes(searchTerm)) ||
      (student['ชื่อ-นามสกุล'] && student['ชื่อ-นามสกุล'].toLowerCase().includes(searchTerm)) ||
      (student['ชั้นเรียน'] && student['ชั้นเรียน'].toLowerCase().includes(searchTerm));
    
    if (status === 'all') return matchesSearch;
    
    const studentStatus = (student['สถานะการชำระเงิน'] || '').toLowerCase();
    
    if (status === 'paid') {
      return matchesSearch && studentStatus.includes('ชำระ');
    } else if (status === 'unpaid') {
      return matchesSearch && (studentStatus.includes('ไม่ได้') || !studentStatus);
    } else if (status === 'partial') {
      return matchesSearch && studentStatus.includes('บางส่วน');
    }
    
    return matchesSearch;
  });
  
  updateStats();
  renderTable();
}

// Search functionality
document.getElementById('searchInput').addEventListener('input', filterData);

// Auto-refresh every 5 minutes
setInterval(loadData, 5 * 60 * 1000);

// Initial load
loadData();
</script>

</body>
</html>
